# ===========================================
# 模型配置（可选，如需修改默认值可取消注释）
# ===========================================

# ASR 语音识别模型
# dashscope_asr_model: "Fun-ASR"           # 推荐：最新一代，噪声鲁棒性更强
# dashscope_asr_model: "qwen3-asr-flash"   # 性价比高，快速经济

# LLM 翻译模型
# llm_model: "qwen-plus"                   # 推荐：旗舰均衡款，性价比高
# llm_model: "qwen-max"                    # 最强效果，适合复杂场景
# llm_model: "qwen-flash"                  # 轻量快速，成本低

# TTS 语音合成模型
# dashscope_tts_model: "cosyvoice-v3-plus"    # 推荐：效果最佳，支持声音复刻
# dashscope_tts_model: "cosyvoice-v3-flash"   # 速度快，性价比高
# dashscope_tts_model: "cosyvoice-v2"         # 成熟稳定，70+ 音色
